# Composite fixture: both MCP broken AND dashboard risky (Hermes v24 format)
# Used by VAL-CROSS-015: multi-broken detects both independently
_config_version: 24
profile: default

model:
  default: claude-sonnet-4-20250514
  provider: auto

providers:
  anthropic:
    api_key_env: ANTHROPIC_API_KEY

terminal:
  backend: local

mcp_servers:
  database:
    command: hermes-mcp-database
    transport: stdio
    env:
      - DB_HOST
      - DB_PORT
      - DB_PASSWORD
  missing-binary:
    command: definitely-not-a-real-binary-that-exists-xyz
    transport: stdio
  playground:
    command: hermes-mcp-playground
    transport: sse
    env:
      - PLAYGROUND_SECRET

dashboard:
  url: http://0.0.0.0:8080
  bind: 0.0.0.0
  auth: false
  tls: false

memory:
  dir: memory
  limit_mb: 10
