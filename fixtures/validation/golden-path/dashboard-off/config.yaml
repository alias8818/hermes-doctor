# Golden path: clean install, dashboard not configured (Hermes v24 format)
_config_version: 24
profile: default

model:
  default: claude-sonnet-4-20250514
  provider: auto

providers:
  anthropic:
    api_key_env: ANTHROPIC_API_KEY

terminal:
  backend: local

mcp_servers:
  test-server:
    command: echo
    transport: stdio
    env:
      - HOME

memory:
  dir: memory
  limit_mb: 10

skills:
  dir: skills

plugins: []

security:
  terminal_backend: restricted-shell
  shell_restricted: true
  sandbox: true
