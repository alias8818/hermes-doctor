# Provider fixture: auxiliary model references provider that is missing (Hermes v24 format)
_config_version: 24
profile: default

model:
  default: claude-sonnet-4-20250514
  provider: auto

providers:
  anthropic:
    api_key_env: ANTHROPIC_API_KEY

auxiliary:
  embeddings:
    provider: cohere
  classification:
    provider: openai

terminal:
  backend: local

mcp_servers: {}

memory:
  dir: memory
  limit_mb: 10

skills:
  dir: skills

plugins: []
