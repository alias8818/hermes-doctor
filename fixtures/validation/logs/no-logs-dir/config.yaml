# Hermes configuration with no logs directory (Hermes v24 format)
_config_version: 24
profile: default

model:
  default: claude-sonnet-4-20250514
  provider: auto

providers:
  anthropic:
    api_key_env: ANTHROPIC_API_KEY

terminal:
  backend: local

dashboard:
  url: http://127.0.0.1:8080
  bind: 127.0.0.1
  auth: true
  tls: false

memory:
  dir: memory
  limit_mb: 10

skills:
  dir: skills
