# Skills fixture: enabled plugin with missing path (Hermes v24 format)
_config_version: 24
profile: default

model:
  default: claude-sonnet-4-20250514
  provider: auto

providers:
  anthropic:
    api_key_env: ANTHROPIC_API_KEY

terminal:
  backend: local

mcp_servers:
  test-server:
    command: echo
    transport: stdio
    env:
      - HOME

dashboard:
  url: http://127.0.0.1:8080
  bind: 127.0.0.1
  auth: true
  tls: false

memory:
  dir: memory
  limit_mb: 10

skills:
  dir: skills

plugins:
  - name: missing-plugin
    enabled: true
    path: plugins/missing-plugin

security:
  terminal_backend: restricted-shell
  shell_restricted: true
  sandbox: true
