# Dashboard fixture: dashboard configured on a localhost port that is in use / unreachable (Hermes v24 format)
_config_version: 24
profile: default

model:
  default: claude-sonnet-4-20250514
  provider: auto

providers:
  anthropic:
    api_key_env: ANTHROPIC_API_KEY

terminal:
  backend: local

mcp_servers: {}

dashboard:
  url: http://127.0.0.1:19998
  bind: 127.0.0.1
  auth: false
  tls: false

memory:
  dir: memory
  limit_mb: 10

skills:
  dir: skills

plugins: []
