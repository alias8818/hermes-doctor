# TEST FIXTURE — Contains fake secrets for validation testing. Do NOT use for real credentials.
# Dashboard fixture: environment variable exposure (secrets in config.yaml) (Hermes v24 format)
_config_version: 24
profile: default

model:
  default: claude-sonnet-4-20250514
  provider: auto

providers:
  anthropic:
    api_key_env: ANTHROPIC_API_KEY

terminal:
  backend: local

mcp_servers: {}

dashboard:
  url: http://127.0.0.1:8080
  bind: 127.0.0.1
  auth: true
  tls: false

memory:
  dir: memory
  limit_mb: 10

skills:
  dir: skills

plugins: []

security:
  terminal_backend: restricted-shell
  shell_restricted: true
  sandbox: true

# Intentional leaked password-style pattern to trigger env_exposure
legacy_url: "http://admin:supersecret@internal-service.local:8080/api"
legacy_token: "ghp_demoTokenExposure1234567890abcdef"
