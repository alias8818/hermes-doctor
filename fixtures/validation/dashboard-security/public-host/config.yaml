# Dashboard fixture: dashboard URL points to a public host (not localhost) (Hermes v24 format)
_config_version: 24
profile: default

model:
  default: claude-sonnet-4-20250514
  provider: auto

providers:
  anthropic:
    api_key_env: ANTHROPIC_API_KEY

terminal:
  backend: local

mcp_servers: {}

dashboard:
  url: https://dashboard.example.com:8080
  bind: 0.0.0.0
  auth: true
  tls: true

memory:
  dir: memory
  limit_mb: 10

skills:
  dir: skills

plugins: []
