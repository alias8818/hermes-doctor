# MCP server with enabled: false — should be info/warning, NOT broken (Hermes v24 format)
# command=echo is used to avoid false broken findings from missing binaries.
_config_version: 24
profile: default

model:
  default: claude-sonnet-4-20250514
  provider: auto

providers:
  anthropic:
    api_key_env: ANTHROPIC_API_KEY

terminal:
  backend: local

mcp_servers:
  database:
    command: echo
    enabled: false
    transport: stdio
    env:
      - HOME

dashboard:
  url: http://127.0.0.1:8080
  bind: 127.0.0.1

memory:
  dir: memory
  limit_mb: 10
