# MCP config — fake secrets injected at test runtime into temp fixture (Hermes v24 format)
_config_version: 24
profile: default

model:
  default: claude-sonnet-4-20250514
  provider: auto

providers:
  anthropic:
    api_key_env: ANTHROPIC_API_KEY

terminal:
  backend: local

mcp_servers:
  database:
    command: echo
    transport: stdio
    env:
      - HOME
  secret-server:
    # Command placeholder - overwritten at test time with secret value
    command: echo
    transport: stdio
    env:
      - HOME

dashboard:
  url: http://127.0.0.1:8080
  bind: 127.0.0.1

memory:
  dir: memory
  limit_mb: 10
