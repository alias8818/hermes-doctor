# MCP server with remote URL — must not be probed, info/warning only (Hermes v24 format)
_config_version: 24
profile: default

model:
  default: claude-sonnet-4-20250514
  provider: auto

providers:
  anthropic:
    api_key_env: ANTHROPIC_API_KEY

terminal:
  backend: local

mcp_servers:
  remote-tools:
    command: echo
    url: https://mcp.example.com/sse
    transport: sse
    env:
      - HOME

dashboard:
  url: http://127.0.0.1:8080
  bind: 127.0.0.1

memory:
  dir: memory
  limit_mb: 10
