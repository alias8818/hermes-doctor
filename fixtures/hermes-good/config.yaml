# Hermes configuration — valid, healthy setup (Hermes v24 format)
_config_version: 24
profile: default

model:
  default: claude-sonnet-4-20250514
  provider: auto

# Provider timeout overrides only (Hermes v24)
providers:
  anthropic:
    api_key_env: ANTHROPIC_API_KEY
  openai:
    api_key_env: OPENAI_API_KEY

terminal:
  backend: local

mcp_servers:
  filesystem:
    command: npx
    args:
      - -y
      - "@modelcontextprotocol/server-filesystem"
    transport: stdio
    env:
      - FS_TOKEN
  github:
    command: npx
    args:
      - -y
      - "@modelcontextprotocol/server-github"
    transport: stdio
    env:
      - GITHUB_TOKEN

dashboard:
  url: http://127.0.0.1:8080
  bind: 127.0.0.1
  auth: true
  tls: false

memory:
  dir: memory
  limit_mb: 10

skills:
  dir: skills

# Plugins configured via plugins array (enabled/disabled lists in Hermes v24)
plugins: []
