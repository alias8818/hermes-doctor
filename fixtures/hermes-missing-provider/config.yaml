# Hermes configuration — provider configured but missing API keys (Hermes v24 format)
_config_version: 24
profile: default

model:
  default: claude-opus-4-20250514
  provider: auto

providers:
  anthropic:
    api_key_env: ANTHROPIC_API_KEY
  openai:
    api_key_env: OPENAI_API_KEY
  groq:
    api_key_env: GROQ_API_KEY
  mistral:
    api_key_env: MISTRAL_API_KEY
  cohere:
    api_key_env: COHERE_API_KEY

terminal:
  backend: local

mcp_servers:
  filesystem:
    command: npx
    args:
      - -y
      - "@modelcontextprotocol/server-filesystem"
    transport: stdio
    env:
      - FS_TOKEN

dashboard:
  url: http://127.0.0.1:8080
  bind: 127.0.0.1
  auth: true

memory:
  dir: memory
  limit_mb: 10

skills:
  dir: skills

plugins: []
